version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: jobtracking-db
    environment:
      SA_PASSWORD: "YourPassword123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - jobtracking-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourPassword123! -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: jobtracking-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: https://+:5001
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=JobTrackingSystemDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;"
    ports:
      - "5001:5001"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - jobtracking-network
    volumes:
      - ./Backend/src:/app/src
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: jobtracking-ui
    ports:
      - "4200:4200"
    environment:
      API_URL: "https://backend:5001"
    depends_on:
      - backend
    networks:
      - jobtracking-network
    restart: unless-stopped

volumes:
  sqlserver_data:

networks:
  jobtracking-network:
    driver: bridge
